<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مركز المساعدة - Wusooly</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        
        :root {
            /* ألوان المود الفاتح (Light Mode) */
            --bg-color: #f8f9fa; 
            --text-color: #333333;
            --btn-blue: #0A84FF; 
            --btn-grey: #e5e5ea;
            --btn-no-text: #333333;
            --input-bg: #ffffff;
            --header-bg: #ffffff;
            --border-color: #d1d1d6;
            --item-hover: #f0f0f0;
        }

        body.dark-mode {
            /* ألوان المود المظلم الفخم (Dark Mode) */
            --bg-color: #000000; 
            --text-color: #ffffff;
            --btn-blue: #0A84FF; 
            --btn-grey: #3A3A3C;
            --btn-no-text: #dadada;
            --input-bg: #1C1C1E;
            --header-bg: #000000;
            --border-color: #333333;
            --item-hover: #2c2c2e;
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        /* تأثير تبديل اللون بنعومة */
        body, header, .problem-item, .input-field, .back-btn, .btn-no { 
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease; 
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- الشريط العلوي --- */
        header { 
            padding: 20px; 
            background-color: var(--header-bg); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 100;
            box-shadow: 0 1px 5px rgba(0,0,0,0.05);
        }
        body.dark-mode header { box-shadow: 0 1px 5px rgba(255,255,255,0.05); }

        .back-btn { 
            cursor: pointer; 
            width: 40px; height: 40px; 
            border-radius: 50%; 
            background: var(--btn-grey); 
            display: flex; align-items: center; justify-content: center; 
            color: var(--text-color); text-decoration: none; font-weight: bold; font-size: 18px;
        }
        .page-title { font-size: 18px; font-weight: 700; color: var(--text-color); }

        /* --- الحاوية الرئيسية --- */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        /* --- الأقسام (Steps) --- */
        .step-section {
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: fadeIn 0.4s ease forwards;
        }
        .step-section.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- النصوص --- */
        .big-question {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* --- الأزرار --- */
        .chat-btn {
            width: 200px; padding: 12px 0; border-radius: 50px;
            font-size: 18px; font-weight: 700; cursor: pointer;
            margin-bottom: 15px; text-align: center; border: none; display: block;
            font-family: 'Cairo', sans-serif;
        }
        .btn-yes { background-color: var(--btn-blue); color: white; box-shadow: 0 4px 15px rgba(10, 132, 255, 0.3); }
        .btn-no { background-color: var(--btn-grey); color: var(--btn-no-text); }
        .chat-btn:active { transform: scale(0.95); }

        /* --- قائمة المشاكل (الخطوة 2) --- */
        .problem-list { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .problem-item {
            background: var(--input-bg);
            padding: 18px;
            border-radius: 15px;
            text-align: right;
            font-weight: 600;
            cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }
        .problem-item:hover { background: var(--item-hover); }
        
        .problem-content-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .blue-icon {
            width: 24px;
            height: 24px;
            stroke: var(--btn-blue);
            fill: none;
            stroke-width: 2;
        }

        /* --- النموذج (الخطوة 3) --- */
        .form-group { width: 100%; margin-bottom: 15px; text-align: right; }
        .label { font-size: 13px; color: #aaa; margin-bottom: 8px; display: block; font-weight: bold; }
        .input-field {
            width: 100%; background: var(--input-bg); border: 1px solid var(--border-color);
            padding: 15px; border-radius: 12px; color: var(--text-color); font-family: 'Cairo', sans-serif; font-size: 16px;
        }
        .input-field:focus { border-color: var(--btn-blue); }
        textarea.input-field { min-height: 120px; resize: none; }
        .error-text { color: #ff453a; font-size: 12px; margin-top: 5px; display: none; }
        .action-row { display: flex; gap: 10px; width: 100%; margin-top: 10px; }
        .full-btn { flex: 1; border-radius: 12px; font-size: 16px; padding: 15px; margin: 0; }

    </style>
</head>
<body>

    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.body.classList.add('dark-mode');
        }
    </script>

    <header>
        <a href="index.html" class="back-btn">➜</a>
        <div class="page-title">الدعم الفني</div>
        <div style="width: 40px;"></div>
    </header>

    <div class="main-container">
        
        <div id="step-1" class="step-section active">
            <h1 class="big-question">هل لديك مشكلة تحتاج<br>إلى معالجة؟</h1>
            <button class="chat-btn btn-yes" onclick="nextStep(1, 2)">نعم لدي.</button>
            <button class="chat-btn btn-no" onclick="handleNo()">ليس لدي.</button>
        </div>

        <div id="step-2" class="step-section">
            <h2 class="big-question" style="font-size: 20px; margin-bottom: 20px;">ما نوع المشكلة؟</h2>
            
            <div class="problem-list">
                <div class="problem-item" onclick="goToForm('الإبلاغ عن طلبية')">
                    <div class="problem-content-row">
                        <svg class="blue-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                        <span>الإبلاغ عن طلبية</span>
                    </div>
                    <span>‹</span>
                </div>

                <div class="problem-item" onclick="goToForm('مشكلة في الشحن')">
                    <div class="problem-content-row">
                        <svg class="blue-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                        <span>مشكلة في الشحن</span>
                    </div>
                    <span>‹</span>
                </div>

                <div class="problem-item" onclick="goToForm('محتوى غير لائق')">
                    <div class="problem-content-row">
                        <svg class="blue-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                        <span>محتوى غير لائق</span>
                    </div>
                    <span>‹</span>
                </div>

                <div class="problem-item" onclick="goToForm('أخرى')">
                    <div class="problem-content-row">
                        <svg class="blue-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        <span>أخرى</span>
                    </div>
                    <span>‹</span>
                </div>
            </div>
            <button class="chat-btn btn-no" onclick="nextStep(2, 1)" style="margin-top: 20px; width: 100%;">رجوع</button>
        </div>

        <div id="step-3" class="step-section">
            <h2 class="big-question" id="form-title" style="font-size: 18px; margin-bottom: 20px;"></h2>
            
            <div class="form-group">
                <label class="label">رقم الهاتف (للتواصل معك)</label>
                <input type="tel" id="inp-phone" class="input-field" placeholder="05xxxxxxxx" dir="ltr" style="text-align: right;">
                <div id="err-phone" class="error-text">الرقم يجب أن يبدأ بـ 05 (10 خانات) أو 5 (9 خانات)</div>
            </div>

            <div class="form-group">
                <label class="label">اشرح المشكلة</label>
                <textarea id="inp-desc" class="input-field" placeholder="اكتب تفاصيل ما حدث..."></textarea>
            </div>

            <div class="action-row">
                <button class="chat-btn btn-yes full-btn" onclick="submitReport()">تقديم الإبلاغ</button>
                <button class="chat-btn btn-no full-btn" onclick="nextStep(3, 2)">إلغاء</button>
            </div>
        </div>

    </div>

    <script>
        let selectedProblem = "";

        function nextStep(current, next) {
            document.getElementById(`step-${current}`).classList.remove('active');
            document.getElementById(`step-${next}`).classList.add('active');
        }

        function handleNo() {
            if(confirm("سيتم نقلك للصفحة الرئيسية لأن الأمور تمام! 😄")) {
                window.location.href = "index.html";
            }
        }

        function goToForm(type) {
            selectedProblem = type;
            document.getElementById('form-title').innerText = "بخصوص: " + type;
            nextStep(2, 3);
        }

        document.getElementById('inp-phone').addEventListener('input', function() {
            const val = this.value;
            const err = document.getElementById('err-phone');
            const isValid = (val.startsWith('05') && val.length === 10 && /^\d+$/.test(val)) ||
                            (val.startsWith('5') && val.length === 9 && /^\d+$/.test(val));
            
            if (isValid) {
                this.style.borderColor = '#4caf50';
                err.style.display = 'none';
            } else {
                this.style.borderColor = '#ff453a';
                err.style.display = 'block';
            }
        });

        function submitReport() {
            const phone = document.getElementById('inp-phone').value;
            const desc = document.getElementById('inp-desc').value;
            const isValidPhone = (phone.startsWith('05') && phone.length === 10 && /^\d+$/.test(phone)) ||
                                 (phone.startsWith('5') && phone.length === 9 && /^\d+$/.test(phone));

            if (!isValidPhone) {
                alert("يرجى التأكد من صحة رقم الهاتف.");
                return;
            }
            if (desc.length < 5) {
                alert("يرجى كتابة تفاصيل المشكلة.");
                return;
            }

            alert(`تم استلام بلاغك (${selectedProblem}) بنجاح!\nسنتواصل معك على: ${phone}`);
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
