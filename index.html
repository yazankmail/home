<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الرئيسية - Acces</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f8f9fa; --header-bg: #ffffff; --text-main: #333333; --text-sub: #666666;
            --accent-color: #0056b3; --secondary-accent: #ff4747; --card-bg: #ffffff; --input-bg: #f9f9f9;
            --nav-bar-bg: #ffffff; --nav-text: #999999; --nav-active: #0056b3;
            --shadow-soft: 0 4px 20px rgba(0,0,0,0.05); --radius-lg: 20px;
        }

        body.dark-mode {
            --bg-color: #121212; --header-bg: #1e1e1e; --text-main: #e0e0e0; --text-sub: #aaaaaa;
            --accent-color: #4dabf7; --secondary-accent: #ff6b6b; --card-bg: #1e1e1e; --input-bg: #2c2c2c;
            --nav-bar-bg: #1e1e1e; --nav-text: #666666; --nav-active: #ffffff;
            --shadow-soft: 0 4px 20px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, header, .product-card, .search-box, .cat-icon, .search-overlay, .categories-overlay, .floating-nav, .icon-btn, .filter-btn, .sidebar { 
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease; 
        }

        body { font-family: 'Tajawal', sans-serif; margin: 0; background-color: var(--bg-color); color: var(--text-main); padding-bottom: 100px; overflow-x: hidden; }
        a { text-decoration: none; color: inherit; }

        header { padding: 15px 20px; background-color: var(--header-bg); position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 5px rgba(0,0,0,0.05); }
        
        .logo-link { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; justify-content: center; z-index: 10; }
        .logo-img { height: 42px; max-width: 160px; width: auto; object-fit: contain; }

        .header-actions { display: flex; gap: 15px; align-items: center; z-index: 20; position: relative; }
        .icon-btn { cursor: pointer; color: var(--text-main); display: flex; align-items: center; justify-content: center; width: 35px; height: 35px; border-radius: 50%; background: var(--input-bg); position: relative; z-index: 20; }
        .icon-btn svg { width: 20px; height: 20px; stroke-width: 2; }

        .moon-icon { display: block; } .sun-icon { display: none; }
        body.dark-mode .moon-icon { display: none; } body.dark-mode .sun-icon { display: block; }

        .search-box { background: var(--input-bg); border-radius: var(--radius-lg); padding: 14px 20px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(0,0,0,0.05); }
        .search-box input { border: none; background: transparent; width: 100%; outline: none; font-family: 'Tajawal', sans-serif; color: var(--text-main); font-size: 15px; font-weight: 600; }
        .search-box svg { color: var(--text-sub); width: 22px; }

        .banner-container { padding: 20px 20px; margin-bottom: 5px; transform: translateZ(0); }
        .slider-wrapper { position: relative; border-radius: 25px; overflow: hidden; height: 160px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: var(--input-bg); transform: translateZ(0); }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 0.8s ease-in-out; will-change: opacity; }
        .slide.active { opacity: 1; z-index: 1; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        
        .slider-dots { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 2; }
        .dot { width: 8px; height: 8px; background: rgba(255, 255, 255, 0.5); border-radius: 50%; transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .dot.active { background: #ffffff; width: 24px; border-radius: 10px; }

        .section-title { padding: 0 20px; font-size: 18px; font-weight: 800; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .section-title span { font-size: 13px; color: var(--accent-color); font-weight: 700; cursor: pointer; }

        .filter-btn { display: flex; align-items: center; justify-content: center; width: 35px; height: 35px; background: var(--input-bg); border-radius: 50%; cursor: pointer; color: var(--text-main); border: 1px solid rgba(0,0,0,0.02); }
        body.dark-mode .filter-btn { border-color: rgba(255,255,255,0.05); }
        .filter-btn:active { transform: scale(0.9); }

        .categories-wrapper { overflow: hidden; width: 100%; margin-bottom: 30px; position: relative; direction: rtl; transform: translateZ(0); }
        .categories-wrapper::before, .categories-wrapper::after { content: ''; position: absolute; top: 0; width: 30px; height: 100%; z-index: 2; pointer-events: none; }
        .categories-wrapper::before { right: 0; background: linear-gradient(to left, var(--bg-color), transparent); }
        .categories-wrapper::after { left: 0; background: linear-gradient(to right, var(--bg-color), transparent); }
        
        .categories-track { 
            display: inline-flex; width: max-content; gap: 15px; padding: 0 15px; 
            animation: scroll-rtl 18s linear infinite; 
            will-change: transform; 
            transform: translate3d(0,0,0);
            -webkit-transform: translate3d(0,0,0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .categories-track:hover, .categories-track:active { animation-play-state: paused; }
        
        @keyframes scroll-rtl {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(50%, 0, 0); } 
        }

        .cat-item { display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 70px; cursor: pointer; text-decoration: none; }
        
        .cat-icon { 
            width: 65px; 
            height: 65px; 
            background: rgba(20, 20, 20, 0.6); 
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            padding: 15px; 
            border: 1px solid rgba(255,255,255,0.1); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            will-change: transform;
            transform: translate3d(0,0,0);
            -webkit-transform: translate3d(0,0,0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        
        .cat-icon img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            filter: drop-shadow(0px 4px 5px rgba(0, 0, 0, 0.6)); 
            transform: translate3d(0,0,0);
            backface-visibility: hidden;
        }
        
        body.dark-mode .cat-icon {
            background: rgba(0, 0, 0, 0.75); 
            border-color: rgba(255, 255, 255, 0.05);
        }
        
        .cat-name { font-size: 14px; color: var(--text-main); font-weight: 700; white-space: nowrap; }

        .search-overlay, .categories-overlay { 
            position: fixed; 
            left: 0; 
            right: 0; 
            bottom: -100%; 
            background-color: var(--nav-bar-bg); 
            padding: 20px; 
            border-radius: 30px 30px 0 0; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.15); 
            z-index: 1002; 
            transition: bottom 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
            display: flex; 
            flex-direction: column; 
            border: 1px solid rgba(0,0,0,0.05); 
        }
        .categories-overlay { height: 60vh; }
        .search-overlay { z-index: 1001; align-items: center; gap: 15px; flex-direction: row; }
        body.dark-mode .search-overlay, body.dark-mode .categories-overlay { border-color: rgba(255,255,255,0.05); }
        
        .search-overlay.active, .categories-overlay.active { bottom: 0; }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-shrink: 0; }
        .modal-header h3 { margin: 0; font-size: 18px; font-weight: 800; color: var(--text-main); }
        .categories-grid-modal { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px 10px; overflow-y: auto; padding-bottom: 30px; }
        .categories-grid-modal .cat-item { min-width: auto; }

        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        
        .product-card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 12px; 
            position: relative; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.04); 
            transition: transform 0.2s; 
            border: 1px solid rgba(0,0,0,0.02); 
            cursor: pointer; 
            transform: translateZ(0); 
            display: flex; 
            flex-direction: column;
            min-width: 0; 
        }
        body.dark-mode .product-card { border-color: rgba(255,255,255,0.05); }
        .product-card:active { transform: scale(0.98); }

        .product-img-wrapper { 
            position: relative; 
            width: 100%; 
            padding-top: 100%; 
            background: var(--input-bg); 
            border-radius: 15px; 
            overflow: hidden; 
            margin-bottom: 12px; 
        }
        .product-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .fav-icon { position: absolute; top: 10px; left: 10px; width: 28px; height: 28px; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: #ccc; font-size: 16px; z-index: 2; }
        
        .product-info { display: flex; flex-direction: column; flex-grow: 1; min-width: 0; }
        .product-info h3 { font-size: 14px; margin: 0 0 4px; color: var(--text-main); font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: right; }
        .product-info p { font-size: 11px; color: var(--text-sub); margin: 0 0 12px; font-weight: 600; text-align: right; }
        
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price { font-size: 16px; font-weight: 800; color: #ff4747; direction: ltr; }
        .add-btn-mini { width: 30px; height: 30px; border-radius: 50%; background: var(--text-main); color: var(--card-bg); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 500; cursor: pointer; line-height: 1; padding-bottom: 2px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 3; }

        /* القائمة الجانبية (Sidebar) */
        .sidebar-overlay { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.5); z-index: 2000; 
            opacity: 0; visibility: hidden; transition: 0.3s ease; 
        }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }
        
        .sidebar { 
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%; 
            background-color: var(--header-bg); z-index: 2001; 
            transition: right 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); 
            box-shadow: -5px 0 15px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; padding: 20px; 
            border-left: 1px solid rgba(0,0,0,0.05);
        }
        body.dark-mode .sidebar { border-left-color: rgba(255,255,255,0.05); }
        .sidebar.active { right: 0; }
        
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 15px; }
        body.dark-mode .sidebar-header { border-bottom-color: rgba(255,255,255,0.05); }
        .sidebar-logo { height: 35px; object-fit: contain; }
        
        .sidebar-menu { display: flex; flex-direction: column; gap: 10px; }
        .sidebar-link { 
            display: flex; align-items: center; gap: 15px; 
            font-size: 16px; font-weight: 700; color: var(--text-main); 
            text-decoration: none; padding: 12px; border-radius: 15px; 
            transition: background-color 0.2s; 
        }
        .sidebar-link:hover, .sidebar-link:active { background-color: var(--input-bg); }
        
        .sidebar-icon { 
            width: 24px; height: 24px; 
            color: #0B2545; 
            display: flex; align-items: center; justify-content: center; 
        }
        body.dark-mode .sidebar-icon { color: #4dabf7; }

        .floating-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background-color: var(--nav-bar-bg); height: 70px; border-radius: 25px; display: flex; justify-content: space-around; align-items: center; padding: 0 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); z-index: 999; border: 1px solid rgba(0,0,0,0.05); transform: translateZ(0); }
        .nav-link { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--nav-text); text-decoration: none; transition: 0.3s; gap: 4px; width: 25%; }
        .nav-link.active { color: var(--nav-active); }
        .nav-link svg { width: 26px; height: 26px; stroke-width: 2; fill: none; stroke: currentColor; }
        
        .close-search-btn { background: var(--input-bg); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-main); font-weight: bold; flex-shrink: 0; }

        @media (max-width: 768px) { .header-cart-icon { display: none !important; } }
        @media (min-width: 769px) { .floating-nav { display: none; } }

        .toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 50px; padding: 12px; position: fixed; z-index: 2000; left: 50%; bottom: 110px; transform: translateX(-50%); font-size: 14px; opacity: 0; transition: opacity 0.3s; box-shadow: 0 5px 20px rgba(0,0,0,0.2); font-weight: bold; }
        .toast.show { visibility: visible; opacity: 1; }
        .loading-products { text-align: center; color: var(--text-sub); width: 100%; grid-column: span 2; padding: 20px; font-weight: bold; }
    </style>
</head>

    <div id="toast" class="toast">تمت الإضافة للسلة ✅</div>

    <script>
        const imageConfig = {
            'app-logo': {
                light: "https://raw.githubusercontent.com/yazankmail/ggg/main/Acces_lightmode_logo.png?v=2",
                dark: "https://raw.githubusercontent.com/yazankmail/ggg/main/Acces_darkmode_logo.png?v=2"
            },
            'sidebar-logo': {
                light: "https://raw.githubusercontent.com/yazankmail/ggg/main/Acces_lightmode_logo.png?v=2",
                dark: "https://raw.githubusercontent.com/yazankmail/ggg/main/Acces_darkmode_logo.png?v=2"
            }
        };

        function updateImages(isDark) {
            for (const [id, urls] of Object.entries(imageConfig)) {
                const el = document.getElementById(id);
                if (el) el.src = isDark ? urls.dark : urls.light;
            }
        }

        window.toggleThemeManual = function() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateImages(isDark);
        }

        window.toggleSearch = function(e) {
            if(e) e.preventDefault();
            const overlay = document.getElementById('search-overlay');
            overlay.classList.toggle('active');
            if(overlay.classList.contains('active')) {
                setTimeout(() => document.getElementById('bottom-search-input').focus(), 100);
            }
        }

        window.toggleCategoriesModal = function() {
            const overlay = document.getElementById('categories-overlay');
            overlay.classList.toggle('active');
        }

        window.toggleSidebar = function() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('sidebar-overlay').classList.toggle('active');
        }

        window.addToCart = function(name, price, image) {
            let cart = JSON.parse(localStorage.getItem('Acces_cart')) || [];
            let existingItem = cart.find(item => item.name === name);
            if (existingItem) existingItem.qty += 1;
            else cart.push({ name: name, price: price, image: image, qty: 1 });
            localStorage.setItem('Acces_cart', JSON.stringify(cart));
            const toast = document.getElementById("toast");
            toast.className = "toast show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            let isDark = savedTheme === 'dark' || (!savedTheme && systemDark);

            if (isDark) document.body.classList.add('dark-mode');
            else document.body.classList.remove('dark-mode');
            
            updateImages(isDark);

            let currentSlide = 0;
            const slides = document.querySelectorAll('.slide');
            const dots = document.querySelectorAll('.dot');
            const totalSlides = slides.length;

            if(totalSlides > 0) {
                setInterval(() => {
                    slides[currentSlide].classList.remove('active');
                    dots[currentSlide].classList.remove('active');
                    
                    currentSlide = (currentSlide + 1) % totalSlides;
                    
                    slides[currentSlide].classList.add('active');
                    dots[currentSlide].classList.add('active');
                }, 5000); 
            }
        });

        // كود تمرير المود عبر الرابط عند الانتقال لصفحات أخرى
        document.addEventListener('click', function(e) {
            const link = e.target.closest('a');
            if (link && link.getAttribute('href') && link.getAttribute('href').endsWith('.html')) {
                e.preventDefault();
                const isDark = document.body.classList.contains('dark-mode');
                const url = new URL(link.href, window.location.href);
                url.searchParams.set('theme', isDark ? 'dark' : 'light');
                window.location.href = url.href;
            }
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, limit, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBa0RwEcbVqWYAKeUFeZy2IDihaxUxtNKY",
            authDomain: "wusooly-1906b.firebaseapp.com",
            projectId: "wusooly-1906b",
            storageBucket: "wusooly-1906b.firebasestorage.app",
            messagingSenderId: "95836343161",
            appId: "1:95836343161:web:73ae3faaca406c0bf7fda8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function fetchProducts() {
            const container = document.getElementById('dynamic-products');
            try {
                const q = query(collection(db, "products"), limit(10)); 
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    container.innerHTML = '<div class="loading-products">لا توجد منتجات حالياً 📭</div>';
                    return;
                }

                container.innerHTML = ''; 

                querySnapshot.forEach((doc) => {
                    const p = doc.data();
                    const imageSrc = (p.images && p.images.length > 0) ? p.images[0] : (p.image || 'https://via.placeholder.com/150');
                    
                    const html = `
                    <div class="product-card" style="padding: 12px; display: flex; flex-direction: column; background: var(--card-bg); border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.02); min-width: 0; transition: background-color 0.2s ease, border-color 0.2s ease;" onclick="window.location.href='product_details.html?id=${doc.id}'">
                        
                        <div style="position: relative; width: 100%; padding-top: 100%; background: var(--input-bg); border-radius: 15px; overflow: hidden; transform: translateZ(0);">
                            <img src="${imageSrc}" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain;" loading="lazy">
                            <div style="position: absolute; top: 10px; left: 10px; width: 28px; height: 28px; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: #ccc; font-size: 16px; z-index: 2;">♡</div>
                        </div>
                        
                        <div style="margin-top: 15px; display: flex; flex-direction: column; flex-grow: 1; min-width: 0;">
                            <h3 style="font-size: 15px; margin: 0 0 4px; color: var(--text-main); font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: right; transition: color 0.2s ease;">${p.name}</h3>
                            <p style="font-size: 12px; color: var(--text-sub); margin: 0 0 15px; font-weight: 600; text-align: right; transition: color 0.2s ease;">${p.category}</p>
                            
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: auto;">
                                <div onclick="event.stopPropagation(); window.addToCart('${p.name}', ${p.price}, '${imageSrc}')" style="width: 32px; height: 32px; border-radius: 50%; background: var(--text-main); color: var(--card-bg); display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; font-weight: 500; line-height: 1; padding-bottom: 2px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: background-color 0.2s ease, color 0.2s ease;">+</div>
                                <div style="font-size: 17px; font-weight: 800; color: #ff4747; direction: ltr;">₪${p.price}</div>
                            </div>
                        </div>
                    </div>`;
                    container.innerHTML += html;
                });

            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="loading-products">حدث خطأ في الاتصال ⚠️</div>';
            }
        }
        fetchProducts();
    </script>
